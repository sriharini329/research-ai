name: 🧪 Flutter E2E Appium Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      device_name:
        description: 'Android AVD name'
        required: false
        default: 'Pixel_6_API_33'

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '24'
  API_LEVEL: '33'
  AVD_NAME: 'Pixel_6_API_33'
  ABI: 'x86_64'
  TARGET: 'google_apis'

jobs:
  flutter-e2e-tests:
    name: 🤖 Run Flutter E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ─── Step 1: Checkout ─────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ─── Step 2: Setup Java ───────────────────────────────────────────────
      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      # ─── Step 3: Setup Node.js (no cache — lock file committed separately) ─
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ─── Step 4: Install E2E Dependencies (MUST be before any tests/reports)
      - name: 📦 Install E2E Node Dependencies
        working-directory: e2e
        run: |
          echo "Installing E2E framework dependencies..."
          npm install --prefer-offline 2>&1 || npm install 2>&1
          echo "✅ E2E dependencies installed"

      # ─── Step 5: Install Appium 2.x ──────────────────────────────────────
      - name: 🔧 Install Appium 2.x and Drivers
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium driver install --source=npm appium-flutter-driver
          appium plugin install execute-driver
          appium --version
          echo "Appium installation complete"

      # ─── Step 6: Configure Test Environment ──────────────────────────────
      - name: ⚙️ Configure Test Environment
        working-directory: e2e
        run: |
          cp .env.example .env
          sed -i 's|DEVICE_NAME=.*|DEVICE_NAME=emulator-5554|' .env
          sed -i 's|PLATFORM_VERSION=.*|PLATFORM_VERSION=10.0|' .env
          if [ -n "$TEST_EMAIL_SECRET" ]; then
            sed -i "s|TEST_EMAIL=.*|TEST_EMAIL=${TEST_EMAIL_SECRET}|" .env
          fi
          if [ -n "$TEST_PASSWORD_SECRET" ]; then
            sed -i "s|TEST_PASSWORD=.*|TEST_PASSWORD=${TEST_PASSWORD_SECRET}|" .env
          fi
          echo "Environment configured."
        env:
          TEST_EMAIL_SECRET:    ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD_SECRET: ${{ secrets.TEST_PASSWORD }}

      # ─── Step 7: Start Appium Server ─────────────────────────────────────
      - name: 🖥️ Start Appium Server
        run: |
          appium \
            --port 4723 \
            --log-level info \
            --use-plugins execute-driver \
            --allow-cors \
            &
          sleep 10
          curl -s http://localhost:4723/status || echo "Appium status check failed"
          echo "Appium server is running"

      # ─── Step 8: Run Tests on Android Emulator ───────────────────────────
      - name: 📱 Run Tests in Android Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            echo "Emulator booted!"
            adb devices -l
            if [ -f "e2e/app/app-release.apk" ]; then adb install -r e2e/app/app-release.apk; echo "✅ APK installed"; else echo "⚠️ APK not found at e2e/app/app-release.apk — tests will try to run anyway"; fi
            cd e2e && npm run ci:verify && npm run test:all 2>&1 | tee ../test-output.log
        env:
          TEST_EMAIL:       ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD:    ${{ secrets.TEST_PASSWORD }}
          APK_PATH:         ./app/app-release.apk
          APP_PACKAGE:      com.company.app
          APP_ACTIVITY:     com.company.app.MainActivity
          DEVICE_NAME:      emulator-5554
          PLATFORM_VERSION: "13.0"

      # ─── Step 9: Generate Excel Report ──────────────────────────────────
      - name: 📊 Generate Excel Report
        working-directory: e2e
        if: always()
        run: |
          echo "Running standalone report generator script..."
          npm run report:excel

      # ─── Step 10: Upload Artifacts ────────────────────────────────────────
      - name: 📁 Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-e2e-results-${{ github.run_number }}
          path: |
            e2e/reports/
            test-output.log
          retention-days: 30

      - name: 📸 Upload Failure Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: e2e/reports/failures/
          retention-days: 30
